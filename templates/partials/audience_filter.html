{% if audience_filter is defined %}
<form method="GET" style="margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
    <label for="audience-select" style="font-size: 13px; color: var(--gray-600); font-weight: 500;">Filter by audience:</label>
    <select id="audience-select" name="audience" style="padding: 4px 8px; border: 1px solid var(--gray-300); border-radius: 4px; font-size: 13px;">
        <option value="">All audiences</option>
        <option value="Adult" {% if audience_filter == 'Adult' %}selected{% endif %}>Adult</option>
        <option value="YA" {% if audience_filter == 'YA' %}selected{% endif %}>YA (Young Adult)</option>
        <option value="Juvenile" {% if audience_filter == 'Juvenile' %}selected{% endif %}>Juvenile (Children)</option>
    </select>
    <button type="submit" class="btn-sm" style="padding: 4px 12px; background: var(--primary); color: white; border: none; border-radius: 4px; font-size: 13px; cursor: pointer;">Go</button>
    {% if audience_filter %}
    <span style="font-size: 12px; color: var(--primary); font-weight: 500;">Showing: {{ audience_filter }} only</span>
    {% endif %}
</form>
{% endif %}
